<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft UUID Converter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

        :root {
            --mc-bg: #313233;
            --mc-panel: #C6C6C6;
            --mc-button: #707070;
            --mc-button-hover: #8B8B8B;
            --mc-border-light: #FFFFFF;
            --mc-border-dark: #555555;
            --mc-text-shadow: 2px 2px 0px #3F3F3F;
            --mc-green: #3fb53f;
        }

        body {
            background-color: #1e1e1e;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            font-family: 'Noto Sans JP', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        .mc-container {
            background-color: var(--mc-panel);
            border: 4px solid #000;
            box-shadow: inset 4px 4px 0 var(--mc-border-light), inset -4px -4px 0 var(--mc-border-dark);
            padding: 30px;
            width: 90%;
            max-width: 500px;
            image-rendering: pixelated;
        }

        h1 {
            color: #fff;
            text-align: center;
            font-size: 24px;
            text-shadow: var(--mc-text-shadow);
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #3F3F3F;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: #000;
            border: 2px solid #555;
            color: #00FF00;
            font-family: monospace;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--mc-border-light);
        }

        .button-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            background-color: var(--mc-button);
            border: 2px solid #000;
            box-shadow: inset 2px 2px 0 #aaa, inset -2px -2px 0 #333;
            color: white;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            text-shadow: 2px 2px 0 #222;
            transition: all 0.1s;
        }

        button:hover {
            background-color: var(--mc-button-hover);
        }

        button:active {
            box-shadow: inset -2px -2px 0 #aaa, inset 2px 2px 0 #333;
            transform: translateY(2px);
        }

        .skin-btn {
            grid-column: span 2;
            background-color: var(--mc-green);
        }

        #skin-display {
            margin-top: 20px;
            text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 4px;
            display: none;
        }

        #skin-image {
            width: 120px;
            image-rendering: pixelated;
        }

        .status {
            font-size: 12px;
            margin-top: 10px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="mc-container">
    <h1>UUID / MCID CONVERTER</h1>

    <div class="input-group">
        <label>Minecraft ID</label>
        <input type="text" id="mcid" placeholder="Steve">
    </div>

    <div class="input-group">
        <label>Player UUID</label>
        <input type="text" id="uuid" placeholder="00000000-0000-0000-0000-000000000000">
    </div>

    <div class="button-layout">
        <button onclick="convert()">変換する</button>
        <button onclick="clearFields()">リセット</button>
        <button class="skin-btn" onclick="fetchSkin()">スキンを取得して表示</button>
    </div>

    <div id="skin-display">
        <label style="color:white">Player Skin</label>
        <img id="skin-image" src="" alt="Skin">
    </div>

    <div class="status" id="status">Ready...</div>
</div>

<script>
    async function convert() {
        const mcidInput = document.getElementById('mcid');
        const uuidInput = document.getElementById('uuid');
        const status = document.getElementById('status');

        try {
            // UUIDからMCIDを取得
            if (uuidInput.value.trim() !== "") {
                status.innerText = "Fetching MCID...";
                const res = await fetch(`https://sessionserver.mojang.com/session/minecraft/profile/${uuidInput.value.trim().replace(/-/g, '')}`);
                if (!res.ok) throw new Error("UUIDが見つかりませんでした");
                const data = await res.json();
                mcidInput.value = data.name;
                status.innerText = "MCIDを取得しました！";
            } 
            // MCIDからUUIDを取得
            else if (mcidInput.value.trim() !== "") {
                status.innerText = "Fetching UUID...";
                const res = await fetch(`https://api.mojang.com/users/profiles/minecraft/${mcidInput.value.trim()}`);
                if (!res.ok) throw new Error("プレイヤーが見つかりませんでした");
                const data = await res.json();
                // 読みやすくハイフンを入れる整形
                const formattedUUID = data.id.replace(/(.{8})(.{4})(.{4})(.{4})(.{12})/, "$1-$2-$3-$4-$5");
                uuidInput.value = formattedUUID;
                status.innerText = "UUIDを取得しました！";
            }
        } catch (err) {
            status.innerText = "エラー: " + err.message;
            status.style.color = "#ff5555";
        }
    }

    function fetchSkin() {
        const uuid = document.getElementById('uuid').value.trim().replace(/-/g, '');
        const display = document.getElementById('skin-display');
        const img = document.getElementById('skin-image');
        
        if (!uuid) {
            alert("UUIDが空です！先に変換してください。");
            return;
        }

        // Crafatarを使用してアバター画像を取得
        img.src = `https://crafatar.com/renders/body/${uuid}?overlay`;
        display.style.display = "block";
        document.getElementById('status').innerText = "スキンを表示しました。";
    }

    function clearFields() {
        document.getElementById('mcid').value = "";
        document.getElementById('uuid').value = "";
        document.getElementById('skin-display').style.display = "none";
        document.getElementById('status').innerText = "Ready...";
        document.getElementById('status').style.color = "#555";
    }
</script>

</body>
</html>
